<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>UAI - Escala 4 Hospitais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fffaf0; font-family: sans-serif; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .hospital-card { border-left-width: 12px; transition: transform 0.2s; }
        .hospital-card:hover { transform: translateX(5px); }
    </style>
</head>
<body class="pb-12">

    <header class="bg-gradient-to-r from-red-700 to-red-500 text-white p-6 text-center shadow-xl border-b-4 border-yellow-400">
        <h1 class="text-4xl font-black italic tracking-tighter">UAI 🤡</h1>
        <p class="text-[10px] font-bold text-yellow-200 uppercase tracking-widest mt-1">Divisão para os 4 Hospitais</p>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-5">
        
        <!-- Status -->
        <div id="status" class="card p-4 text-center text-sm font-bold text-gray-400 italic">
            ⏳ Sincronizando com pastas locais...
        </div>

        <!-- Data -->
        <div class="card p-5">
            <label class="block text-[10px] font-black text-red-400 uppercase mb-2">Data do Plantão:</label>
            <input type="date" id="data-plantao" class="w-full p-3 bg-red-50 rounded-xl font-bold text-lg border-2 border-transparent focus:border-red-300 outline-none">
        </div>

        <!-- Presença -->
        <div class="card p-5">
            <h2 class="font-black text-gray-800 mb-4 flex justify-between items-center text-lg">
                QUEM VAI HOJE? 🎭
                <span id="contador" class="text-sm bg-red-600 text-white px-3 py-1 rounded-full px-2">0</span>
            </h2>
            <div id="lista-presenca" class="grid grid-cols-1 gap-2 max-h-80 overflow-y-auto pr-2">
                <!-- Preenchido via JS -->
            </div>
        </div>

        <!-- Gerar -->
        <button onclick="gerarEscala()" id="btn-gerar" class="w-full bg-red-600 text-white font-black py-5 rounded-3xl shadow-2xl text-xl hover:bg-red-700 active:scale-95 transition-all disabled:opacity-30" disabled>
            GERAR EQUIPES 🎲
        </button>

        <!-- Resultado -->
        <div id="resultado" class="hidden space-y-4">
            <h2 class="text-center font-black text-gray-400 uppercase text-xs tracking-widest mt-8">Escala sugeria para hoje</h2>
            <div id="equipes-hospitais" class="space-y-4"></div>
            
            <button onclick="copiarWhatsApp()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                COPIAR PARA WHATSAPP 📱
            </button>
        </div>
    </main>

    <script>
        const HOSPITAIS = [
            { nome: "Santa Casa de Mogi Guaçu", cor: "border-blue-500", bg: "bg-blue-50" },
            { nome: "Santa Casa de Mogi Mirim", cor: "border-emerald-500", bg: "bg-emerald-50" },
            { nome: "Hospital São Francisco", cor: "border-purple-500", bg: "bg-purple-50" },
            { nome: "Hospital 22 de Outubro", cor: "border-red-500", bg: "bg-red-50" }
        ];

        const ARQUIVOS = {
            voluntarios: "./dados/voluntarios.csv",
            indisponibilidade: "./dados/indisponibilidade.csv",
            historico: "./dados/historico_escalas.csv"
        };

        let db = { voluntarios: [], indisponiveis: [], historico: [] };
        document.getElementById('data-plantao').valueAsDate = new Date();

        async function fetchCSV(url) {
            try {
                const resp = await fetch(url + '?v=' + Date.now());
                if(!resp.ok) return [];
                const text = await resp.text();
                const lines = text.split('\n').filter(l => l.trim() !== "");
                const header = lines[0].split(',').map(c => c.trim().toLowerCase());
                return lines.slice(1).map(line => {
                    const values = line.split(',');
                    let obj = {};
                    header.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : "");
                    return obj;
                });
            } catch(e) { return []; }
        }

        async function init() {
            db.voluntarios = await fetchCSV(ARQUIVOS.voluntarios);
            db.indisponiveis = await fetchCSV(ARQUIVOS.indisponibilidade);
            db.historico = await fetchCSV(ARQUIVOS.historico);

            if(db.voluntarios.length > 0) {
                renderizarPresenca();
                document.getElementById('status').innerHTML = "✅ Dados carregados!";
                document.getElementById('btn-gerar').disabled = false;
            } else {
                document.getElementById('status').innerHTML = "❌ Erro ao ler voluntarios.csv";
            }
        }

        function renderizarPresenca() {
            const container = document.getElementById('lista-presenca');
            const dataSel = document.getElementById('data-plantao').value;
            container.innerHTML = "";
            
            const idsIndisponiveis = db.indisponiveis.filter(i => i.data === dataSel).map(i => i.voluntario_id);

            db.voluntarios
                .filter(v => v.ativo && v.ativo.toUpperCase() === 'SIM')
                .forEach(p => {
                    const block = idsIndisponiveis.includes(p.id);
                    const div = document.createElement('div');
                    div.className = `flex items-center p-3 rounded-xl border ${block ? 'opacity-40 bg-gray-100 cursor-not-allowed' : 'bg-white border-gray-100'}`;
                    div.innerHTML = `
                        <label class="flex items-center w-full ${block ? '' : 'cursor-pointer'}">
                            <input type="checkbox" value="${p.id}" ${block ? 'disabled' : 'onchange="atualizarContador()"'} class="w-5 h-5 accent-red-600 mr-3">
                            <div class="text-sm">
                                <span class="font-bold text-gray-800">${p.apelido || p.nome} ${block ? '🚫' : ''}</span>
                                <span class="text-[10px] text-gray-400 block uppercase">
                                    ${p.carro.toUpperCase() === 'SIM' ? '🚗 Motorista' : '👣 Passageiro'}
                                </span>
                            </div>
                        </label>
                    `;
                    container.appendChild(div);
                });
            atualizarContador();
        }

        function atualizarContador() {
            const qtd = document.querySelectorAll('#lista-presenca input:checked').length;
            document.getElementById('contador').innerText = qtd;
        }

        function gerarEscala() {
            const selecionadosIds = Array.from(document.querySelectorAll('#lista-presenca input:checked')).map(el => el.value);
            let presentes = db.voluntarios.filter(v => selecionadosIds.includes(v.id));

            if (presentes.length < 4) return alert("Precisamos de pelo menos 4 pessoas para cobrir os 4 hospitais!");

            // Injetar histórico
            presentes.forEach(p => {
                const ultimaVez = [...db.historico].reverse().find(h => h.voluntario_id === p.id);
                p.ultimoHospital = ultimaVez ? ultimaVez.hospital : "";
            });

            // Embaralhar
            presentes.sort(() => Math.random() - 0.5);

            // Separar motoristas
            let motoristas = presentes.filter(v => v.carro.toUpperCase() === 'SIM');
            let passageiros = presentes.filter(v => v.carro.toUpperCase() !== 'SIM');

            // Preparar Hospitais
            let escala = {
                "Santa Casa de Mogi Guaçu": [],
                "Santa Casa de Mogi Mirim": [],
                "Hospital São Francisco": [],
                "Hospital 22 de Outubro": []
            };

            // 1. Garantir 1 motorista em cada hospital primeiro (se houver)
            HOSPITAIS.forEach(h => {
                if(motoristas.length > 0) escala[h.nome].push(motoristas.shift());
            });

            // 2. Se sobrou motorista, vira passageiro para o resto da conta
            let restantes = [...motoristas, ...passageiros];
            restantes.sort(() => Math.random() - 0.5);

            // 3. Garantir que cada hospital tenha pelo menos 1 pessoa (caso não houvesse motorista para todos)
            HOSPITAIS.forEach(h => {
                if(escala[h.nome].length === 0 && restantes.length > 0) {
                    escala[h.nome].push(restantes.shift());
                }
            });

            // 4. Distribuir o resto uniformemente
            let i = 0;
            while(restantes.length > 0) {
                escala[HOSPITAIS[i % 4].nome].push(restantes.shift());
                i++;
            }

            exibirHTML(escala);
        }

        function exibirHTML(escala) {
            const container = document.getElementById('equipes-hospitais');
            const resDiv = document.getElementById('resultado');
            container.innerHTML = "";
            resDiv.classList.remove('hidden');
            resDiv.scrollIntoView({ behavior: 'smooth' });

            HOSPITAIS.forEach(h => {
                const pessoas = escala[h.nome];
                const nomesLI = pessoas.map(p => {
                    const repetido = p.ultimoHospital === h.nome ? '<span class="text-[10px] text-red-500 font-bold ml-1 italic">(Repetido)</span>' : '';
                    return `<li class="py-1 border-b border-black/5 text-sm font-medium">
                        • ${p.apelido} ${p.carro.toUpperCase()==='SIM'?'🚗':''} ${repetido}
                    </li>`;
                }).join("");

                container.innerHTML += `
                    <div class="hospital-card card p-4 ${h.cor} ${h.bg}">
                        <h3 class="text-xs font-black uppercase text-gray-500 mb-2">${h.nome}</h3>
                        <ul class="space-y-1">${nomesLI}</ul>
                    </div>
                `;
            });
        }

        function copiarWhatsApp() {
            let texto = `*ESCALA UAI - PLANTÃO DA ALEGRIA* 🤡\n\n`;
            HOSPITAIS.forEach(h => {
                const card = Array.from(document.querySelectorAll('.hospital-card')).find(c => c.innerText.includes(h.nome.toUpperCase()));
                if(card) {
                    texto += `*${h.nome.toUpperCase()}*\n`;
                    card.querySelectorAll('li').forEach(li => {
                        texto += li.innerText.replace('(Repetido)', '').trim() + "\n";
                    });
                    texto += "\n";
                }
            });
            texto += "_Unidade de Alegria Intensiva_ ✨";
            navigator.clipboard.writeText(texto).then(() => alert("Copiado com sucesso!"));
        }

        document.getElementById('data-plantao').addEventListener('change', renderizarPresenca);
        init();
    </script>
</body>
</html>
